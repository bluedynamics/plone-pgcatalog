server {
    listen 80;
    client_max_body_size 100m;

    # Plone backend with VirtualHostMonster so Plone generates correct URLs.
    # $http_host includes the port (e.g. "localhost:8080") which VHM needs.
    # The Plone site is mounted at /Plone so it appears as the site root.
    location / {
        rewrite ^(.*)$ /VirtualHostBase/http/$http_host/Plone/VirtualHostRoot$1 break;
        proxy_pass http://plone:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_redirect http://plone:8080/Plone/ /;
    }
}
