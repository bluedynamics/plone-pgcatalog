services:
  postgres:
    # Default: postgres:17 (tsvector ranking, no extensions needed)
    # For BM25: PG_IMAGE=tensorchord/vchord-suite:pg17-latest docker compose up -d --build
    image: ${PG_IMAGE:-postgres:17}
    environment:
      POSTGRES_USER: zodb
      POSTGRES_PASSWORD: zodb
      POSTGRES_DB: zodb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "zodb"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  createbucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/zodb-blobs;
      echo 'Bucket zodb-blobs created';
      "

  plone:
    build: plone
    command: ["start"]
    environment:
      PGJSONB_DSN: "dbname=zodb user=zodb password=zodb host=postgres port=5432"
      SITE: "Plone"
      TYPE: "classic"
      PROFILES: "plone.pgcatalog:default"
    depends_on:
      postgres:
        condition: service_healthy
      createbucket:
        condition: service_completed_successfully

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - plone

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  pgdata:
  miniodata:
