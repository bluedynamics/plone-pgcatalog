%import zodb_pgjsonb

%define INSTANCE /app

instancehome $INSTANCE

%define CLIENTHOME $(CLIENT_HOME)
clienthome $CLIENTHOME

debug-mode $(DEBUG_MODE)
security-policy-implementation $(SECURITY_POLICY_IMPLEMENTATION)
verbose-security $(VERBOSE_SECURITY)
default-zpublisher-encoding $(DEFAULT_ZPUBLISHER_ENCODING)

<environment>
    CHAMELEON_CACHE $INSTANCE/var/cache
    PGCATALOG_BM25_LANGUAGES auto
</environment>

<dos_protection>
  form-memory-limit $(ZOPE_FORM_MEMORY_LIMIT)
  form-disk-limit $(ZOPE_FORM_DISK_LIMIT)
  form-memfile-limit $(ZOPE_FORM_MEMFILE_LIMIT)
</dos_protection>

<zodb_db main>
  cache-size $(ZODB_CACHE_SIZE)
  <pgjsonb>
    dsn $(PGJSONB_DSN)
    blob-temp-dir $INSTANCE/var/blobstorage

    # S3 tiered blob storage (MinIO on host)
    s3-bucket-name zodb-blobs
    s3-endpoint-url http://host.docker.internal:9000
    s3-access-key minioadmin
    s3-secret-key minioadmin
    s3-use-ssl false
    blob-threshold 1MB
  </pgjsonb>
  mount-point /
</zodb_db>
