%define INSTANCEHOME ./instance
instancehome $INSTANCEHOME

%define CLIENTHOME ./instance/var
clienthome $CLIENTHOME

debug-mode on
security-policy-implementation C
default-zpublisher-encoding utf-8

<environment>
    zope_i18n_compile_mo_files true
    PGCATALOG_BM25_LANGUAGES en,de,zh
</environment>

# Database — using zodb-pgjsonb with optional S3 blob tiering
# Start MinIO: docker compose --profile s3 up -d
%import zodb_pgjsonb

<zodb_db main>
    mount-point /
    cache-size 30000
    <pgjsonb>
        dsn dbname=zodb user=zodb password=zodb host=localhost port=5433
        blob-temp-dir ./instance/var/blobtemp
        blob-cache-dir ./instance/var/blobcache

        # S3 tiered blob storage (MinIO) — blobs >= 1MB go to S3
        s3-bucket-name zodb-blobs
        s3-endpoint-url http://localhost:9000
        s3-access-key minioadmin
        s3-secret-key minioadmin
        s3-use-ssl false
        blob-threshold 1MB
    </pgjsonb>
</zodb_db>
